<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>校园服务智能助手</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <section class="login-panel" id="loginPanel" aria-label="登录">
      <form class="login-card" id="loginForm">
        <span class="brand-mark">OA</span>
        <h1>智能服务台登录</h1>
        <p>登录后可使用会话、知识库、图片上传和模型调用能力。</p>
        <label>
          用户名
          <input id="usernameInput" type="text" autocomplete="username" value="admin" />
        </label>
        <label>
          密码
          <input id="passwordInput" type="password" autocomplete="current-password" value="admin123" />
        </label>
        <button class="primary-button" type="submit">登录</button>
        <small id="loginError"></small>
      </form>
    </section>

    <main class="shell">
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark">OA</span>
        </div>
        <nav class="top-actions" aria-label="顶部操作">
          <select id="sessionSelect" aria-label="会话选择"></select>
          <button class="ghost-button" id="newSessionButton" type="button">新会话</button>
          <span class="user-pill" id="userLabel">未登录</span>
          <button class="ghost-button" id="logoutButton" type="button">退出</button>
          <span class="status-pill">Online</span>
        </nav>
      </header>

      <section class="stats-strip" aria-label="调用统计">
        <span id="sessionLabel">会话：未创建</span>
        <span id="usageLabel">Tokens：0</span>
        <span id="costLabel">费用：$0.00000000</span>
        <span id="toolsLabel">工具：未调用</span>
      </section>

      <section class="workspace">
        <aside class="scenario-panel" aria-label="应用场景">
          <div class="scenario-copy">
            <h1 id="scenarioTitle">校园服务智能助手</h1>
            <p id="scenarioSubtitle">面向校园办事咨询、宿舍报修、图片故障描述和实时信息查询。</p>
          </div>
          <div class="scenario-side">
            <div class="scenario-actions" id="scenarioActions" aria-label="快捷问题"></div>
            <div class="knowledge-box" aria-label="知识库">
              <div>
                <span class="section-kicker">知识库</span>
                <strong id="knowledgeCount">0 份资料</strong>
                <small id="knowledgeHint">支持 txt / md / pdf / docx</small>
              </div>
              <input
                id="knowledgeFileInput"
                class="visually-hidden"
                type="file"
                accept=".txt,.md,.markdown,.pdf,.docx,text/plain,text/markdown,application/pdf,application/vnd.openxmlformats-officedocument.wordprocessingml.document"
                multiple
                aria-label="上传知识库资料"
              />
              <button class="ghost-button" id="knowledgeUploadButton" type="button">上传资料</button>
            </div>
          </div>
        </aside>

        <section class="chat-workspace" aria-label="聊天工作区">
          <section class="conversation" id="conversation" aria-live="polite"></section>

          <section class="wave-panel" aria-label="音频波形可视化">
            <span>音频波形可视化</span>
            <div class="wave" id="wave"></div>
          </section>

          <section class="composer" aria-label="输入区">
            <div class="input-row">
              <button class="primary-button" id="voiceButton" type="button">按住说话</button>
              <input
                id="textInput"
                type="text"
                autocomplete="off"
                placeholder="文字输入..."
                aria-label="文字输入"
              />
              <input
                id="fileInput"
                class="visually-hidden"
                type="file"
                accept="image/png,image/jpeg,image/webp,image/gif"
                multiple
                aria-label="上传图片"
              />
              <button class="icon-button" id="attachButton" type="button" title="上传图片">📎</button>
              <button class="icon-button" id="sendButton" type="button" title="发送">➤</button>
              <button class="icon-button" id="stopButton" type="button" title="停止">■</button>
            </div>

            <div class="attachment-strip" id="attachmentStrip" aria-label="图片附件"></div>

            <div class="select-grid">
              <label>
                模型
                <select id="modelSelect"></select>
              </label>
              <label>
                语音
                <select id="voiceSelect"></select>
              </label>
              <label>
                ASR
                <select id="asrSelect"></select>
              </label>
              <label>
                TTS
                <select id="ttsSelect"></select>
              </label>
            </div>
          </section>
        </section>
      </section>
    </main>

    <template id="messageTemplate">
      <article class="message">
        <div class="speaker"></div>
        <div class="bubble">
          <div class="content"></div>
          <div class="message-actions"></div>
        </div>
      </article>
    </template>

    <script src="/static/app.js" type="module"></script>
  </body>
</html>
